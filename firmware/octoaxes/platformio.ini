; =============================================================================
; Octoaxes Firmware - PlatformIO Configuration
; Multi-axis Motion Controller for SQUID Microscope Platform
; Target: Teensy 4.1 (ARM Cortex-M7 @ 600MHz)
; =============================================================================

[platformio]
name = octoaxes
description = Multi-axis motion control firmware for precision microscopy
default_envs = teensy41
src_dir = .

; generate compile_commands.json for clangd LSP support
; run pio run -t compiledb to generate it
extra_configs =

; =============================================================================
; Common Settings (shared across all environments)
; =============================================================================
[common]
framework = arduino
platform = teensy
board = teensy41

; Library dependencies
lib_deps =
    fastled/FastLED @ ^3.6.0
    bakercp/PacketSerial @ ^1.4.0

; Common build flags
build_flags =
    -D ARDUINO_TEENSY41
    -I tmc
    ; Optimization
    -O2
    ; Warnings
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Wno-deprecated-copy    ; suppress the warning from the Teensy framework's DMAChannel.h

; Source filter
build_src_filter =
    +<*>
    -<.git/>
    -<test/>
    -<docs/>

; =============================================================================
; Production Environment
; =============================================================================
[env:teensy41]
extends = common

; CPU frequency: 600MHz (default), options: 24/150/396/450/528/600/720/816/912/960
board_build.f_cpu = 600000000L

; Build configuration
build_type = release
build_flags =
    ${common.build_flags}
    -D NDEBUG
    -ffunction-sections
    -fdata-sections

; Linker optimization - remove unused code
build_unflags =
    -Os

; Upload settings
upload_protocol = teensy-cli

; Serial monitor
monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF
monitor_filters =
    default
    time

; =============================================================================
; Debug Environment
; =============================================================================
[env:teensy41_debug]
extends = common

board_build.f_cpu = 600000000L

build_type = debug
build_flags =
    ${common.build_flags}
    -D DEBUG
    -D CORE_DEBUG_LEVEL=5
    -g3
    -ggdb

upload_protocol = teensy-cli

monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF
monitor_filters =
    default
    time
    log2file

; =============================================================================
; Development Environment (with extra warnings)
; =============================================================================
[env:teensy41_dev]
extends = common

board_build.f_cpu = 600000000L

build_type = debug
build_flags =
    ${common.build_flags}
    -D DEBUG
    -Werror=return-type
    -Wshadow
    -Wformat=2
    -g

upload_protocol = teensy-cli

monitor_speed = 2000000
monitor_echo = yes
monitor_eol = LF

; =============================================================================
; High Performance Environment (overclock to 720MHz)
; WARNING: Ensure adequate cooling before using this configuration
; =============================================================================
[env:teensy41_fast]
extends = common

board_build.f_cpu = 720000000L

build_type = release
build_flags =
    ${common.build_flags}
    -D NDEBUG
    -D HIGH_PERFORMANCE
    -O3
    -ffunction-sections
    -fdata-sections

upload_protocol = teensy-cli

monitor_speed = 2000000

; =============================================================================
; No-Interlock Environment (for stations without laser interlock hardware)
; for stations without a laser interlock signal (pin 2): disables the illumination_interlock_ok check,
; otherwise the D1-D5 TTL outputs (405/488/561/638/730 fluorescence channels) never come up.
; warning: use only when there is confirmed no laser risk. The LED matrix (brightfield) does not go through the interlock and is unaffected.
; =============================================================================
[env:teensy41_nointerlock]
extends = env:teensy41

build_flags =
    ${env:teensy41.build_flags}
    -D DISABLE_LASER_INTERLOCK

; =============================================================================
; Legacy LED Matrix Environment (old hardware LED batch with reversed R/G byte order)
; use this environment when the LED matrix shows "R slider drives green, G slider drives red, B normal".
; root cause: the FastLED template assumes the LED byte order is BGR, but some old APA102 batches are BRG.
; enabling -D LED_MATRIX_SWAP_RG makes the firmware swap the R/G arguments when calling led_set_*,
; equivalent to the historical behavior of legacy Squid functions.cpp:1933.
; see the illumination.cpp::LED_RG_ARGS comment for details.
; =============================================================================
[env:teensy41_legacyled]
extends = env:teensy41

build_flags =
    ${env:teensy41.build_flags}
    -D LED_MATRIX_SWAP_RG

[env:teensy41_nointerlock_legacyled]
extends = env:teensy41

build_flags =
    ${env:teensy41.build_flags}
    -D DISABLE_LASER_INTERLOCK
    -D LED_MATRIX_SWAP_RG

; =============================================================================
; Other Build Options (uncomment as needed)
; =============================================================================
; To enable verbose SPI debugging:
;   Add -D SPI_DEBUG to build_flags
;
; To enable motion profiling output:
;   Add -D MOTION_PROFILE_DEBUG to build_flags
