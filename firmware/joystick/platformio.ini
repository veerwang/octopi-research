[platformio]
src_dir = .

[env]
platform = teensy
board = teensylc
framework = arduino

; Library dependencies
lib_deps =
    bakercp/PacketSerial@^1.4.0

; Monitor settings
monitor_speed = 115200

; Domestic build (default): joystick X/Y sensitivity factor /8
[env:teensyLC]

; Overseas build: joystick X/Y sensitivity factor /4 (2x output at the same detent)
[env:teensyLC_overseas]
build_flags = -D REGION_OVERSEAS
